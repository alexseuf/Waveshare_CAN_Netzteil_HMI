<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Waveshare CAN-Netzteil-HMI – Firmware installieren</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background:#071426; color:#eef6ff; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; }
    main { width:min(620px,calc(100% - 32px)); background:#10233c; border:1px solid #2c5680; border-radius:18px; padding:28px; box-shadow:0 18px 55px #0008; }
    h1 { margin-top:0; font-size:clamp(1.5rem,4vw,2.2rem); }
    label { display:block; margin:24px 0 8px; font-weight:700; }
    select { width:100%; padding:12px; border-radius:9px; border:1px solid #4b7198; background:#081a2e; color:inherit; font-size:1rem; }
    .install { margin-top:22px; min-height:48px; }
    .hint,.status { color:#b9cce0; line-height:1.5; }
    .error { color:#ffb2b2; }
    a { color:#83c9ff; }
  </style>
</head>
<body>
<main>
  <h1>Firmware installieren</h1>
  <p class="hint">Waveshare ESP32-S3-Touch-LCD-4.3 per USB verbinden und gewünschte Version auswählen.</p>
  <label for="version">Verfügbare Version</label>
  <select id="version" disabled><option>Versionen werden gesucht …</option></select>
  <div id="installer" class="install"></div>
  <p id="status" class="status">GitHub-Releases werden geladen …</p>
  <p class="hint">Das Flashen funktioniert mit Chrome oder Edge. Vorhandene Einstellungen können beim Installieren optional gelöscht werden.</p>
</main>
<script>
const REPO = "alexseuf/Waveshare_CAN_Netzteil_HMI";
const select = document.querySelector("#version");
const installer = document.querySelector("#installer");
const status = document.querySelector("#status");

function versionParts(tag) {
  return tag.replace(/^v/i, "").split(/[.-]/).map(x => /^\d+$/.test(x) ? Number(x) : x);
}
function compareVersions(a,b) {
  const av=versionParts(a.tag_name), bv=versionParts(b.tag_name);
  for(let i=0;i<Math.max(av.length,bv.length);i++){
    const x=av[i]??0,y=bv[i]??0;
    if(x===y) continue;
    if(typeof x==="number"&&typeof y==="number") return y-x;
    return String(y).localeCompare(String(x),undefined,{numeric:true});
  }
  return 0;
}
function showRelease(release) {
  const manifest = release.assets.find(a => a.name === "manifest.json");
  installer.replaceChildren();
  if (!manifest) return;
  const button = document.createElement("esp-web-install-button");
  button.setAttribute("manifest", manifest.browser_download_url);
  installer.append(button);
  status.className = "status";
  status.innerHTML = `Ausgewählt: <strong>${release.name || release.tag_name}</strong> · <a href="${release.html_url}" target="_blank" rel="noopener">Release-Informationen</a>`;
}
async function loadReleases() {
  try {
    const response = await fetch(`https://api.github.com/repos/${REPO}/releases?per_page=100`, {
      headers: { Accept: "application/vnd.github+json" },
      cache: "no-store"
    });
    if (!response.ok) throw new Error(`GitHub antwortet mit Status ${response.status}`);
    const releases = (await response.json())
      .filter(r => !r.draft && r.assets.some(a => a.name === "manifest.json"))
      .sort(compareVersions);
    if (!releases.length) throw new Error("Noch kein Release mit einer manifest.json gefunden.");
    select.replaceChildren(...releases.map((release,index) => {
      const option=document.createElement("option");
      option.value=String(index);
      option.textContent=`${release.tag_name}${release.prerelease ? " (Vorabversion)" : ""}`;
      return option;
    }));
    select.disabled=false;
    select.addEventListener("change",()=>showRelease(releases[Number(select.value)]));
    showRelease(releases[0]);
  } catch (error) {
    select.replaceChildren(new Option("Keine flashbare Version gefunden"));
    status.className="status error";
    status.textContent=`Versionen konnten nicht geladen werden: ${error.message}`;
  }
}
loadReleases();
</script>
</body>
</html>
