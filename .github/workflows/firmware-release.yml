name: Firmware Release

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths:
      - ".github/workflows/firmware-release.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Vorhandener Tag, z. B. v9.4.2"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || (github.ref_type == 'tag' && github.ref_name) || 'v9.4.2' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Apply compatibility fix for older releases
        run: |
          if grep -q '^#include <ESP.h>$' src/ui_settings.cpp; then
            sed -i 's/^#include <ESP.h>$/#include <Arduino.h>/' src/ui_settings.cpp
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install platformio rich-click intelhex
      - run: pio run -e waveshare_esp32s3_lcd43
      - name: Merge flash image
        run: |
          python ~/.platformio/packages/tool-esptoolpy/esptool.py --chip esp32s3 merge_bin -o firmware.factory.bin \
            0x0000 .pio/build/waveshare_esp32s3_lcd43/bootloader.bin \
            0x8000 .pio/build/waveshare_esp32s3_lcd43/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/waveshare_esp32s3_lcd43/firmware.bin
      - name: Create web installer manifest
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os
          tag = os.environ["RELEASE_TAG"]
          repo = os.environ["REPOSITORY"]
          manifest = {
              "name": "Waveshare CAN-Netzteil-HMI",
              "version": tag,
              "new_install_prompt_erase": True,
              "builds": [{
                  "chipFamily": "ESP32-S3",
                  "parts": [{
                      "path": f"https://github.com/{repo}/releases/download/{tag}/firmware.factory.bin",
                      "offset": 0
                  }]
              }]
          }
          with open("manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          PY
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          gh release upload "$RELEASE_TAG" firmware.factory.bin manifest.json --clobber
