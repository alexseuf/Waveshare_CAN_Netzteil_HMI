name: PlatformIO Firmware Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ESP32-S3 firmware
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build firmware
        shell: bash
        run: |
          set +e
          pio run --environment waveshare_esp32s3_lcd43 2>&1 | tee platformio-build.log
          status=${PIPESTATUS[0]}
          grep -nE "fatal error:|error:|undefined reference|FAILED|Error [0-9]+" platformio-build.log > platformio-errors.txt || true
          exit "$status"

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: PlatformIO-build-errors-${{ github.run_number }}
          path: |
            platformio-build.log
            platformio-errors.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Collect build files
        if: success()
        shell: bash
        run: |
          mkdir -p firmware-artifact
          cp .pio/build/waveshare_esp32s3_lcd43/*.bin firmware-artifact/ 2>/dev/null || true
          cp .pio/build/waveshare_esp32s3_lcd43/*.elf firmware-artifact/ 2>/dev/null || true
          cp .pio/build/waveshare_esp32s3_lcd43/*.map firmware-artifact/ 2>/dev/null || true
          cp platformio.ini firmware-artifact/
          test -f firmware-artifact/firmware.bin

      - name: Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Waveshare_CAN_Netzteil_HMI-${{ github.ref_name }}
          path: firmware-artifact/
          if-no-files-found: error
          retention-days: 90
